name: massive
display_name: Massive (Polygon.io) US Equities
type: websocket
status: active
versions:
  - version: v1
    effective_from: "2026-06-17"
    protocol:
      transport: wss
      message: json
    endpoint: wss://delayed.polygon.io/stocks
    auth_method: api_key

# Message types received from Polygon.io delayed stock cluster.
# The account is on the Starter plan, which authorizes aggregate channels
# (A. = per-second OHLCV bars, AM. = per-minute OHLCV bars) but NOT trades (T.)
# or quotes (Q.). Aggregates carry no sequence number; ordering is by window
# start timestamp (field s, epoch millis).
message_types:
  ohlcv_1s:
    identifier_field: symbol
    timestamp_field: start_ts_ms
    timestamp_format: epoch_millis
    sequenced: false
    fanout: true
  ohlcv_1m:
    identifier_field: symbol
    timestamp_field: start_ts_ms
    timestamp_format: epoch_millis
    sequenced: false
    fanout: true
